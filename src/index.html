<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading and Sorting</title>
</head>

<body>
    <div class="container">
        <h1>Топ фильмов</h1>
        <div class="sort-info">
            <span>Сортировка: </span>
            <span id="sort-field">id</span>
            <span> </span>
            <span id="sort-order">по возрастанию</span>
        </div>
        <table class="movies-table">
            <thead>
                <tr>
                    <th data-field="id">ID</th>
                    <th data-field="title">Название</th>
                    <th data-field="year">Год</th>
                    <th data-field="imdb">IMDB</th>
                </tr>
            </thead>
            <tbody id="movies-body"></tbody>
        </table>
    </div>
</body>

</html>
